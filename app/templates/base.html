<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}{{ config.title }}{% endblock %}</title>
        <meta name="description" content="{{ config.description }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>

    <body>
        <header class="header">
            <nav class="navbar">
                <div class="nav-container">
                    <a href="{{ url_for('main.home') }}" class="nav-logo">{{ config.name }}</a>
                    <ul class="nav-menu">
                        <li class="nav-item">
                            <a href="{{ url_for('main.home') }}" class="nav-link">Home</a>
                        </li>
                        <li class="nav-item">
                            <a href="{{ url_for('main.about') }}" class="nav-link">About</a>
                        </li>
                        <li class="nav-item">
                            <a href="{{ url_for('main.projects_page') }}" class="nav-link">Projects</a>
                        </li>
                        <li class="nav-item">
                            <a href="{{ url_for('main.contact') }}" class="nav-link">Contact</a>
                        </li>
                    </ul>
                    <div class="nav-controls">
                        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                            </svg>
                            <svg class="moon-icon" style="display: none;" xmlns="http://www.w3.org/2000/svg" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                            </svg>
                        </button>
                        <div class="hamburger">
                            <span class="bar"></span>
                            <span class="bar"></span>
                            <span class="bar"></span>
                        </div>
                    </div>
                </div>
            </nav>
        </header>

        <main class="main">
            {% block content %}{% endblock %}
        </main>

        <footer class="footer">
            <div class="footer-container">
                <div class="footer-content">
                    <div class="footer-info">
                        <h3>{{ config.name }}</h3>
                        <p>{{ config.description }}</p>
                    </div>
                    <div class="footer-social">
                        <a href="{{ config.github }}" class="social-link" target="_blank">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="{{ config.linkedin }}" class="social-link" target="_blank">
                            <i class="fab fa-linkedin"></i>
                        </a>
                        <a href="{{ config.facebook }}" class="social-link" target="_blank">
                            <i class="fab fa-facebook"></i>
                        </a>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2024 {{ config.name }}. All rights reserved.</p>
                </div>
            </div>
        </footer>

        <script src="{{ url_for('static', filename='js/main.js') }}"></script>
        {% block scripts %}{% endblock %}
    </body>

</html>
